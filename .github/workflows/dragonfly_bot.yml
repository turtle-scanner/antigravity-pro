name: Dragonfly Headless Bot

on:
  schedule:
    # 15분마다 실행 (UTC 기준)
    - cron: '*/15 * * * *'
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-with: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance requests pytz numpy

      - name: Run Dragonfly Bot
        env:
          # GitHub Repository Secrets에 아래 항목들을 반드시 등록해야 합니다.
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_MOCK_TRADING: ${{ secrets.KIS_MOCK_TRADING }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MASTER_GAS_URL: ${{ secrets.MASTER_GAS_URL }}
        run: python headless_dragonfly_bot.py
